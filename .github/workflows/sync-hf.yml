name: Sync to Hugging Face

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        run: |
          git remote add hf https://wilddata-backend:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/wilddata-backend/wilddata-api
          git push hf main --force
